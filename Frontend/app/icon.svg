<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Vibrant AI Rainbow Gradient running diagonally -->
    <linearGradient id="ai-sparkle-gradient" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#FF4B4B" />    <!-- Coral/Red -->
      <stop offset="35%" stop-color="#FFB800" />   <!-- Amber/Yellow -->
      <stop offset="65%" stop-color="#10B981" />   <!-- Emerald/Green -->
      <stop offset="100%" stop-color="#3B82F6" />  <!-- Royal Blue -->
    </linearGradient>
  </defs>

  <!-- Smooth 4-Pointed Star Flare Matrix -->
  <path 
    d="M 32 4 C 32 20 20 32 4 32 C 20 32 32 44 32 60 C 32 44 44 32 60 32 C 44 32 32 20 32 4 Z" 
    fill="url(#ai-sparkle-gradient)" 
  />
</svg>
